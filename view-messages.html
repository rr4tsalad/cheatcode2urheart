<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Messages</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px 20px;
    }

    h2 {
      color: #6a4343;
      margin-bottom: 20px;
    }

    .message {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      margin: 10px auto;
      max-width: 500px;
      text-align: left;
      background-color: #f9f0f0;
    }

    .message h3 {
      margin: 0 0 5px 0;
      color: #6a4343;
    }

    .message p {
      margin: 0;
    }

    #status {
      margin-top: 20px;
      font-size: 16px;
      color: #6a4343;
    }
  </style>
</head>
<body>

  <h2>Gök'ün Doğum Günü Mesajları &lt;3</h2>
  <div id="messages-container"></div>
  <div id="status">Yükleniyor...</div>

  <script>
    // --- Firebase config (replace with your own) ---
     const firebaseConfig = {
  apiKey: "AIzaSyCJq10nbOq_tNT2-VRNdVhA9kEd3NLXZrQ",
  authDomain: "gokbd-9d8af.firebaseapp.com",
  databaseURL: "https://gokbd-9d8af-default-rtdb.firebaseio.com",
  projectId: "gokbd-9d8af",
  storageBucket: "gokbd-9d8af.firebasestorage.app",
  messagingSenderId: "357023568004",
  appId: "1:357023568004:web:d98f821eebbd5e18b2f2d1",
  measurementId: "G-JNP4QH9FQD"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const container = document.getElementById('messages-container');
    const status = document.getElementById('status');

    // Fetch messages in real-time
    db.collection("birthdayMessages")
      .orderBy("timestamp", "desc") // newest first
      .onSnapshot(snapshot => {
        container.innerHTML = ""; // clear existing messages

        if (snapshot.empty) {
          status.textContent = "Henüz mesaj yok XD";
          return;
        }

        status.textContent = "";

        snapshot.forEach(doc => {
          const data = doc.data();
          const div = document.createElement('div');
          div.className = "message";
          div.innerHTML = `
            <h3>${data.name || "Anonymous"}</h3>
            <p>${data.message}</p>
          `;
          container.appendChild(div);
        });
      }, err => {
        console.error(err);
        status.textContent = "Hata. Kys";
      });
  </script>

</body>
</html>
